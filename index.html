<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI提词器">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a2e'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E🎤%3C/text%3E%3C/svg%3E">
    <title>AI 提词器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --tp-spoken: rgba(78, 205, 196, 0.35);
            --tp-active: #fff;
            --tp-current: #ffe66d;
            --tp-text: rgba(255,255,255,0.5);
            --tp-bg: #12121f;
            --tp-surface: rgba(255,255,255,0.04);
            --tp-border: rgba(255,255,255,0.06);
            --tp-overlay: rgba(0,0,0,0.6);
            --tp-radius-sm: 10px;
            --tp-radius-md: 16px;
            --tp-radius-lg: 24px;
            --tp-accent: #667eea;
            --tp-accent2: #764ba2;
            --tp-font-size: 26px;
            --tp-line-height: 1.9;
        }

        html, body { height: 100%; width: 100%; overflow: hidden; }

        body {
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Noto Sans SC', sans-serif;
            background: var(--tp-bg);
            color: #eee;
            display: flex;
            flex-direction: column;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            transition: background 0.35s ease;
        }

        /* ===== 顶栏 ===== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(10px + var(--safe-top)) 14px 10px;
            background: rgba(18,18,31,0.92);
            backdrop-filter: blur(40px) saturate(1.4);
            -webkit-backdrop-filter: blur(40px) saturate(1.4);
            border-bottom: 1px solid var(--tp-border);
            flex-shrink: 0;
            z-index: 10;
            transition: background 0.35s;
        }

        .toolbar-title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--tp-accent), var(--tp-accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.3px;
        }

        .toolbar-actions { display: flex; gap: 4px; }

        .toolbar-btn {
            background: var(--tp-surface);
            border: none;
            color: rgba(255,255,255,0.7);
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
            will-change: transform;
        }
        .toolbar-btn:active { background: rgba(255,255,255,0.12); transform: scale(0.88); }

        /* ===== 提词器主体 ===== */
        .tp-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #tp-content {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 28px 20px 50px;
            -webkit-overflow-scrolling: touch;
            font-size: var(--tp-font-size);
            line-height: var(--tp-line-height);
            color: var(--tp-text);
            word-wrap: break-word;
            white-space: pre-wrap;
            overscroll-behavior: contain;
            transition: font-size 0.2s, letter-spacing 0.2s, line-height 0.2s, color 0.35s;
            will-change: scroll-position;
        }

        #tp-content .word {
            transition: color 0.1s ease;
            display: inline;
        }
        #tp-content .word.spoken { color: var(--tp-spoken); }
        #tp-content .word.active { color: var(--tp-active); font-weight: 500; }
        #tp-content .word.current { color: var(--tp-current); font-weight: 700; text-shadow: 0 0 18px rgba(255,230,109,0.1); }
        .word-gap { display: inline; white-space: pre; }

        /* 空状态 */
        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 30px; text-align: center;
        }
        .empty-state-icon { font-size: 52px; margin-bottom: 14px; opacity: 0.3; }
        .empty-state h2 { font-size: 19px; margin-bottom: 6px; color: rgba(255,255,255,0.5); font-weight: 600; }
        .empty-state p { font-size: 13px; color: rgba(255,255,255,0.25); line-height: 1.6; }
        .empty-state-actions { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; justify-content: center; }

        .empty-state-btn {
            padding: 11px 22px; border-radius: var(--tp-radius-sm); border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .empty-state-btn.primary { background: var(--tp-accent); color: #fff; }
        .empty-state-btn.primary:active { transform: scale(0.95); background: #5a6fd6; }
        .empty-state-btn.secondary { background: var(--tp-surface); color: rgba(255,255,255,0.6); }
        .empty-state-btn.secondary:active { transform: scale(0.95); }

        /* ===== 底部控制栏 ===== */
        .controls {
            background: rgba(18,18,31,0.92);
            backdrop-filter: blur(40px) saturate(1.4);
            -webkit-backdrop-filter: blur(40px) saturate(1.4);
            border-top: 1px solid var(--tp-border);
            padding: 8px 14px;
            padding-bottom: calc(8px + var(--safe-bottom));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: background 0.35s;
        }

        /* 自动下滑 - 主要按钮 */
        .btn-scroll {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 2px solid var(--tp-border);
            background: var(--tp-surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; flex-shrink: 0;
            font-size: 18px; color: rgba(255,255,255,0.6);
            will-change: transform, border-color;
        }
        .btn-scroll.active { border-color: var(--tp-accent); background: rgba(102,126,234,0.15); color: #fff; }
        .btn-scroll:active { transform: scale(0.9); }

        /* 速度组 */
        .speed-group {
            display: flex; align-items: center; gap: 4px;
            background: var(--tp-surface);
            border-radius: 20px;
            padding: 4px 10px;
            flex-shrink: 0;
        }
        .speed-group label { font-size: 10px; color: rgba(255,255,255,0.3); }
        .speed-group input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 48px; height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 1px; outline: none;
        }
        .speed-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--tp-accent); cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .speed-value { font-size: 11px; color: rgba(255,255,255,0.4); min-width: 20px; text-align: center; font-variant-numeric: tabular-nums; }

        .status-text {
            flex: 1; font-size: 11px; color: rgba(255,255,255,0.35);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
        }
        .status-text.highlight { color: #4ecdc4 !important; }
        .status-text.error { color: #ff4757 !important; }

        /* 语音按钮（次要） */
        .btn-mic {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid var(--tp-border);
            background: var(--tp-surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; flex-shrink: 0;
            font-size: 16px; color: rgba(255,255,255,0.4);
            will-change: transform;
        }
        .btn-mic.active { border-color: #ff4757; background: rgba(255,71,87,0.12); color: #ff4757; }
        .btn-mic.listening { animation: mic-pulse 1.4s ease-in-out infinite; }
        .btn-mic:active { transform: scale(0.88); }

        @keyframes mic-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
            50% { box-shadow: 0 0 0 8px rgba(255,71,87,0.08); }
        }

        /* 设置按钮 */
        .btn-settings-icon {
            width: 34px; height: 34px; border-radius: 50%;
            border: none; background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s;
            font-size: 15px; color: rgba(255,255,255,0.35);
            flex-shrink: 0;
        }
        .btn-settings-icon:active { background: var(--tp-surface); transform: scale(0.88); }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: var(--tp-overlay);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none; align-items: flex-end; justify-content: center;
            z-index: 100; padding: 0;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: #1a1a30;
            border-radius: var(--tp-radius-lg) var(--tp-radius-lg) 0 0;
            width: 100%; max-width: 500px; max-height: 82vh;
            overflow-y: auto;
            padding: 18px 20px calc(18px + var(--safe-bottom));
            box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
            animation: slide-up 0.35s cubic-bezier(0.32,0.72,0,1);
            transition: background 0.35s;
        }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-handle { width: 32px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.1); margin: 0 auto 14px; }
        .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: rgba(255,255,255,0.9); }

        .modal-textarea {
            width: 100%; min-height: 160px; max-height: 40vh;
            padding: 14px; border-radius: var(--tp-radius-md);
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--tp-border);
            color: #eee; font-size: 15px; font-family: inherit; line-height: 1.6;
            resize: none; outline: none; -webkit-appearance: none;
        }
        .modal-textarea:focus { border-color: var(--tp-accent); }

        .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

        .modal-btn {
            flex: 1; padding: 13px 18px; border-radius: var(--tp-radius-sm);
            border: none; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .modal-btn:active { transform: scale(0.97); }
        .modal-btn.cancel { background: var(--tp-surface); color: rgba(255,255,255,0.5); }
        .modal-btn.cancel:active { background: rgba(255,255,255,0.08); }
        .modal-btn.confirm { background: var(--tp-accent); color: #fff; }
        .modal-btn.confirm:active { background: #5a6fd6; }

        /* ===== 进度条 ===== */
        .progress-bar { height: 2px; background: rgba(255,255,255,0.03); flex-shrink: 0; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--tp-accent), var(--tp-accent2)); width: 0%; transition: width 0.3s cubic-bezier(0.4,0,0.2,1); }

        /* 滚动条 */
        #tp-content::-webkit-scrollbar { width: 2px; }
        #tp-content::-webkit-scrollbar-track { background: transparent; }
        #tp-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.04); border-radius: 2px; }

        /* ===== 设置面板 ===== */
        .settings-group { margin-bottom: 18px; }
        .settings-group-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.3); margin-bottom: 12px; letter-spacing: 0.5px; }
        .settings-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .settings-label { font-size: 13px; color: rgba(255,255,255,0.6); min-width: 52px; flex-shrink: 0; }
        .settings-value { font-size: 12px; color: rgba(255,255,255,0.35); min-width: 32px; text-align: center; font-variant-numeric: tabular-nums; }

        .settings-slider {
            flex: 1;
            -webkit-appearance: none; appearance: none;
            height: 2px; background: rgba(255,255,255,0.06);
            border-radius: 1px; outline: none;
        }
        .settings-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--tp-accent); cursor: pointer;
            border: 2px solid rgba(255,255,255,0.15);
        }

        /* 颜色预设 */
        .color-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-dot {
            width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; border: 2px solid transparent;
            transition: all 0.15s; will-change: transform;
        }
        .color-dot:active { transform: scale(0.85); }
        .color-dot.active { border-color: var(--tp-accent); box-shadow: 0 0 0 2px var(--tp-accent); }

        /* 背景预设 */
        .bg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .bg-box {
            border-radius: var(--tp-radius-sm); padding: 14px 8px; text-align: center;
            cursor: pointer; border: 2px solid transparent; transition: all 0.15s; will-change: transform;
        }
        .bg-box:active { transform: scale(0.95); }
        .bg-box.active { border-color: var(--tp-accent); }
        .bg-dot { width: 22px; height: 22px; border-radius: 50%; margin: 0 auto 3px; border: 2px solid rgba(255,255,255,0.1); }
        .bg-name { font-size: 10px; opacity: 0.5; }

        /* ===== FAB回到顶部 ===== */
        .fab-top {
            position: absolute; bottom: 14px; right: 14px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(102,126,234,0.8);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: none; color: #fff; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            opacity: 0; transform: scale(0.5) translateY(10px);
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            will-change: transform, opacity;
        }
        .fab-top.show { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .fab-top:active { transform: scale(0.85); }

        /* ===== 完成提示 ===== */
        .done-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(18,18,31,0.75);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s;
        }
        .done-overlay.show { opacity: 1; pointer-events: auto; }
        .done-icon { font-size: 44px; margin-bottom: 10px; }
        .done-text { font-size: 17px; color: rgba(255,255,255,0.5); font-weight: 600; }

        /* ===== 响应式 ===== */
        @media (max-width: 374px) {
            #tp-content { font-size: 20px; line-height: 1.7; padding: 18px 14px 36px; }
            .toolbar-title { font-size: 14px; }
            .btn-scroll { width: 42px; height: 42px; font-size: 16px; }
            .controls { padding: 6px 10px; gap: 6px; }
        }
        @media (min-width: 430px) {
            #tp-content { font-size: 30px; padding: 32px 24px 56px; }
        }
        @media (min-width: 768px) {
            #tp-content { font-size: 34px; padding: 40px 32px 64px; max-width: 720px; margin: 0 auto; }
        }

        ::selection { background: rgba(102,126,234,0.25); }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="toolbar-title">🎤 AI 提词器</div>
        <div class="toolbar-actions">
            <button class="toolbar-btn" id="btnImport" title="导入TXT">📂</button>
            <button class="toolbar-btn" id="btnPaste" title="粘贴文字">✏️</button>
            <button class="toolbar-btn" id="btnReset" title="重置">🔄</button>
        </div>
    </div>

    <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>

    <div class="tp-wrapper" id="tpWrapper">
        <div id="tp-content"></div>
        <button class="fab-top" id="fabTop">⬆</button>
        <div class="done-overlay" id="doneOverlay">
            <div class="done-icon">🎉</div>
            <div class="done-text">全部完成</div>
        </div>
    </div>

    <div class="controls">
        <!-- 自动下滑（主要功能） -->
        <button class="btn-scroll" id="btnScroll" title="自动下滑">⏬</button>

        <!-- 速度调节 -->
        <div class="speed-group">
            <label>速度</label>
            <input type="range" id="scrollSpeed" min="1" max="10" step="1" value="4">
            <span class="speed-value" id="scrollSpeedVal">4</span>
        </div>

        <div class="status-text" id="statusText">⏸ 就绪</div>

        <!-- 语音识别（次要） -->
        <button class="btn-mic" id="btnMic" title="语音识别">🎤</button>
        <button class="btn-settings-icon" id="btnSettings" title="设置">⚙️</button>
    </div>

    <!-- 文字输入 -->
    <div class="modal-overlay" id="textModal">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-title">✏️ 输入文字</div>
            <textarea class="modal-textarea" id="textInput" placeholder="粘贴或输入稿件内容..."></textarea>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">取消</button>
                <button class="modal-btn confirm" id="modalConfirm">导入</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".txt,.text,text/plain" style="display:none">

    <!-- 设置 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-title">⚙️ 设置</div>

            <div class="settings-group">
                <div class="settings-group-title">字体大小</div>
                <div class="settings-row">
                    <span class="settings-label">Aa</span>
                    <input type="range" class="settings-slider" id="fontSizeSlider" min="14" max="42" step="1" value="26">
                    <span class="settings-value" id="fontSizeVal">26</span>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-group-title">行间距</div>
                <div class="settings-row">
                    <span class="settings-label">行高</span>
                    <input type="range" class="settings-slider" id="lineHeightSlider" min="1.2" max="3.0" step="0.1" value="1.9">
                    <span class="settings-value" id="lineHeightVal">1.9</span>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-group-title">字间距</div>
                <div class="settings-row">
                    <span class="settings-label">间距</span>
                    <input type="range" class="settings-slider" id="letterSpaceSlider" min="0" max="6" step="0.5" value="0">
                    <span class="settings-value" id="letterSpaceVal">0</span>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-group-title">高亮颜色</div>
                <div class="color-grid" id="colorGrid">
                    <div class="color-dot active" data-c="default" style="background:linear-gradient(135deg,#667eea,#764ba2);" title="默认"></div>
                    <div class="color-dot" data-c="#ffe66d" style="background:#ffe66d;" title="暖黄"></div>
                    <div class="color-dot" data-c="#4ecdc4" style="background:#4ecdc4;" title="青绿"></div>
                    <div class="color-dot" data-c="#ff6b6b" style="background:#ff6b6b;" title="珊瑚"></div>
                    <div class="color-dot" data-c="#a29bfe" style="background:#a29bfe;" title="淡紫"></div>
                    <div class="color-dot" data-c="#fd79a8" style="background:#fd79a8;" title="粉红"></div>
                    <div class="color-dot" data-c="#fff" style="background:#fff;border-color:rgba(255,255,255,0.15);" title="纯白"></div>
                    <div class="color-dot" data-c="#dfe6e9" style="background:#dfe6e9;border-color:rgba(255,255,255,0.15);" title="浅灰"></div>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-group-title">背景主题</div>
                <div class="bg-grid" id="bgGrid">
                    <div class="bg-box active" data-bg="dark" style="background:#12121f;"><div class="bg-dot" style="background:#12121f;border-color:rgba(255,255,255,0.1);"></div><div class="bg-name">深色</div></div>
                    <div class="bg-box" data-bg="light" style="background:#eeeef2;"><div class="bg-dot" style="background:#eeeef2;border-color:rgba(0,0,0,0.08);"></div><div class="bg-name" style="color:rgba(0,0,0,0.4);">浅色</div></div>
                    <div class="bg-box" data-bg="warm" style="background:#2a1e14;"><div class="bg-dot" style="background:#2a1e14;border-color:rgba(255,200,150,0.15);"></div><div class="bg-name">暖棕</div></div>
                    <div class="bg-box" data-bg="green" style="background:#142214;"><div class="bg-dot" style="background:#142214;border-color:rgba(150,255,150,0.1);"></div><div class="bg-name">护眼</div></div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="modal-btn confirm" id="settingsDone">完成</button>
            </div>
        </div>
    </div>

<script>
(function(){
    'use strict';

    // ===== DOM =====
    var tp = document.getElementById('tp-content');
    var wrapper = document.getElementById('tpWrapper');
    var status = document.getElementById('statusText');
    var prog = document.getElementById('progressFill');
    var btnScroll = document.getElementById('btnScroll');
    var scrollSpeed = document.getElementById('scrollSpeed');
    var scrollSpeedVal = document.getElementById('scrollSpeedVal');
    var btnMic = document.getElementById('btnMic');
    var btnSettings = document.getElementById('btnSettings');
    var btnImport = document.getElementById('btnImport');
    var btnPaste = document.getElementById('btnPaste');
    var btnReset = document.getElementById('btnReset');
    var fileInput = document.getElementById('fileInput');
    var fabTop = document.getElementById('fabTop');
    var doneOverlay = document.getElementById('doneOverlay');

    var textModal = document.getElementById('textModal');
    var textInput = document.getElementById('textInput');
    var modalCancel = document.getElementById('modalCancel');
    var modalConfirm = document.getElementById('modalConfirm');

    var settingsModal = document.getElementById('settingsModal');
    var settingsDone = document.getElementById('settingsDone');
    var fontSizeSlider = document.getElementById('fontSizeSlider');
    var fontSizeVal = document.getElementById('fontSizeVal');
    var lineHeightSlider = document.getElementById('lineHeightSlider');
    var lineHeightVal = document.getElementById('lineHeightVal');
    var letterSpaceSlider = document.getElementById('letterSpaceSlider');
    var letterSpaceVal = document.getElementById('letterSpaceVal');
    var colorGrid = document.getElementById('colorGrid');
    var bgGrid = document.getElementById('bgGrid');

    var root = document.documentElement;

    // ===== 状态 =====
    var words = [], elements = [], currentIdx = -1, inited = false,
        isScrolling = false, scrollTimer = null, isRecording = false, recog = null, recogTimer = null,
        scrollTimout = null, currentBg = 'dark', currentColor = 'default', lastSpoken = '';

    // ===== 工具 =====
    function setStatus(msg, t) {
        status.textContent = msg;
        status.className = 'status-text';
        if (t === 'highlight') status.classList.add('highlight');
        else if (t === 'error') status.classList.add('error');
    }

    function updProg() {
        if (!words.length) { prog.style.width = '0%'; return; }
        prog.style.width = Math.min(((currentIdx + 1) / words.length) * 100, 100) + '%';
    }

    function norm(t) { return t.replace(/[\u3000-\u303f\uff00-\uffef，。、；：！？""''（）【】《》「」『』〈〉\s\.\,\;\:\!\?\(\)\[\]\{\}\-\—\~\·\`\‘\’\“\”]/g,'').toLowerCase().trim(); }
    function normC(c) { return c.replace(/[\u3000-\u303f\uff00-\uffef，。、；：！？""''（）【】《》「」『』〈〉\s\.\,\;\:\!\?\(\)\[\]\{\}\-\—\~\·\`\‘\’\“\”]/g,'').toLowerCase(); }

    function tokenize(text) {
        var tokens = [], i = 0;
        while (i < text.length) {
            var ch = text[i];
            if (/[\s\r\n]/.test(ch)) { i++; continue; }
            if (/[\u4e00-\u9fff]/.test(ch)) { tokens.push(ch); i++; }
            else if (/[a-zA-Z]/.test(ch)) { var w=''; while(i<text.length && /[a-zA-Z']/.test(text[i])) { w+=text[i]; i++; } tokens.push(w); }
            else if (/[0-9]/.test(ch)) { var n=''; while(i<text.length && /[0-9]/.test(text[i])) { n+=text[i]; i++; } tokens.push(n); }
            else { tokens.push(ch); i++; }
        }
        return tokens;
    }

    // ===== 主题 =====
    var themes = {
        dark:  { bg:'#12121f', m:'#1a1a30', sp:'rgba(78,205,196,0.35)', ac:'#fff', cu:'#ffe66d', tx:'rgba(255,255,255,0.5)', srf:'rgba(255,255,255,0.04)' },
        light: { bg:'#eeeef2', m:'#f0f0f5', sp:'rgba(90,111,214,0.3)', ac:'#1a1a2e', cu:'#5a6fd6', tx:'rgba(0,0,0,0.4)', srf:'rgba(0,0,0,0.04)' },
        warm:  { bg:'#2a1e14', m:'#352618', sp:'rgba(255,200,150,0.3)', ac:'#fff8f0', cu:'#ffb88c', tx:'rgba(255,220,180,0.55)', srf:'rgba(255,255,255,0.05)' },
        green: { bg:'#142214', m:'#1e301e', sp:'rgba(150,255,150,0.25)', ac:'#f0fff0', cu:'#90ee90', tx:'rgba(180,255,180,0.5)', srf:'rgba(255,255,255,0.04)' }
    };

    function applyBg(name) {
        var t = themes[name]; if (!t) return;
        currentBg = name;
        root.style.setProperty('--tp-bg', t.bg);
        root.style.setProperty('--tp-spoken', t.sp);
        root.style.setProperty('--tp-active', t.ac);
        root.style.setProperty('--tp-text', t.tx);
        if (currentColor === 'default') root.style.setProperty('--tp-current', t.cu);
        root.style.setProperty('--tp-surface', t.srf);
        document.body.style.background = t.bg;
        [document.querySelector('.toolbar'), document.querySelector('.controls')].forEach(function(el) {
            if (el) el.style.background = t.bg + 'eb';
        });
        document.querySelectorAll('.modal').forEach(function(el) { el.style.background = t.m; });
    }

    function applyColor(c) {
        currentColor = c;
        if (c === 'default') {
            root.style.setProperty('--tp-current', themes[currentBg] ? themes[currentBg].cu : '#ffe66d');
            document.querySelectorAll('#tp-content .word.current').forEach(function(el) { el.style.color = ''; });
        } else {
            root.style.setProperty('--tp-current', c);
        }
    }

    // ===== 加载文字 =====
    function loadText(text) {
        tp.innerHTML = ''; words = []; elements = []; currentIdx = -1;
        doneOverlay.classList.remove('show');

        if (!text || !text.trim()) { showEmpty(); return; }
        var tokens = tokenize(text);
        if (!tokens.length) { showEmpty(); return; }

        words = tokens.map(function(t,i) { return {text:t, index:i}; });

        for (var i = 0; i < tokens.length; i++) {
            var s = document.createElement('span');
            s.className = 'word'; s.textContent = tokens[i]; s.dataset.index = i;
            tp.appendChild(s); elements.push(s);
            if (i < tokens.length - 1) {
                var sp = document.createElement('span');
                sp.className = 'word-gap'; sp.textContent = ' ';
                tp.appendChild(sp);
            }
        }

        inited = true; currentIdx = -1;
        updProg(); setStatus('✅ ' + tokens.length + ' 词', '');
    }

    function showEmpty() {
        tp.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><h2>还没有内容</h2><p>导入 TXT 或粘贴文字开始</p><div class="empty-state-actions"><button class="empty-state-btn primary" id="ei">📂 导入 TXT</button><button class="empty-state-btn secondary" id="ep">✏️ 粘贴文字</button></div></div>';
        inited = false; words = []; elements = []; currentIdx = -1;
        prog.style.width = '0%'; doneOverlay.classList.remove('show');
        var ei = document.getElementById('ei'), ep = document.getElementById('ep');
        if (ei) ei.onclick = function(){ fileInput.click(); };
        if (ep) ep.onclick = showTextModal;
    }

    // ===== 自动下滑（核心功能） =====
    function startScroll() {
        if (scrollTimer) clearInterval(scrollTimer);
        isScrolling = true;
        btnScroll.classList.add('active');
        var speed = parseInt(scrollSpeed.value);
        var interval = Math.max(20, 110 - speed * 9);
        var step = Math.max(1, speed * 0.6 + 0.5);

        scrollTimer = setInterval(function() {
            if (!isScrolling) return;
            tp.scrollTop += step;
            if (tp.scrollTop + tp.clientHeight >= tp.scrollHeight - 1) {
                // 到底后回到顶部
                goTop();
                // 如果仍然开启，继续
                if (isScrolling) {
                    var self = scrollTimer;
                    setTimeout(function() {
                        if (isScrolling && scrollTimer === self) startScroll();
                    }, 600);
                }
            }
            updFab();
        }, interval);
        setStatus('⏬ 自动下滑中 (' + speed + ')', 'highlight');
    }

    function stopScroll() {
        isScrolling = false;
        btnScroll.classList.remove('active');
        if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
        setStatus('⏸ 已暂停', '');
    }

    function toggleScroll() {
        if (isScrolling) { stopScroll(); }
        else {
            if (!inited || !words.length) { setStatus('📝 请先导入稿件', 'error'); return; }
            startScroll();
        }
    }

    function goTop() {
        var wasScrolling = isScrolling;
        if (wasScrolling) { stopScroll(); }
        tp.scrollTo({ top: 0, behavior: 'smooth' });
        fabTop.classList.remove('show');
        setTimeout(function() {
            if (wasScrolling && inited && words.length) startScroll();
        }, 400);
    }

    function updFab() {
        fabTop.classList.toggle('show', tp.scrollTop > wrapper.clientHeight * 0.5);
    }

    // ===== 语音滚动 =====
    function scrollToWord(idx) {
        if (scrollTimout) clearTimeout(scrollTimout);
        scrollTimout = setTimeout(function() {
            var el = elements[idx];
            if (!el) return;
            var wr = wrapper.getBoundingClientRect(), er = el.getBoundingClientRect();
            var target = wrapper.scrollTop + (er.top - wr.top) - wr.height * 0.35;
            wrapper.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
        }, 60);
    }

    function updRange(from, to) {
        for (var i = from; i <= to && i < elements.length; i++) {
            elements[i].classList.remove('active','current','spoken');
            elements[i].classList.add('spoken');
        }
        if (to >= 0 && to < elements.length) {
            elements[to].classList.remove('spoken');
            elements[to].classList.add('active','current');
        }
    }

    function matchText(spoken) {
        if (!inited || !words.length) return;
        var n = norm(spoken); if (!n) return;
        var start = Math.max(0, currentIdx + 1), end = words.length, chars = n.split('');
        var bestEnd = -1, bestLen = 0;

        for (var s = start; s < end; s++) {
            var m = 0, sp = 0, wp = s;
            while (sp < chars.length && wp < end) {
                var wc = normC(words[wp].text), sc = chars[sp];
                if (wc === sc) { m++; sp++; wp++; }
                else {
                    if (!/[\u4e00-\u9fffa-zA-Z0-9]/.test(wc)) { wp++; continue; }
                    if (!/[\u4e00-\u9fffa-zA-Z0-9]/.test(sc)) { sp++; continue; }
                    break;
                }
            }
            if (m > bestLen) { bestLen = m; bestEnd = s + m - 1; }
            if (m >= chars.length) break;
        }

        if (bestLen > 0 && bestEnd > currentIdx) {
            var ni = bestEnd;
            updRange(currentIdx + 1, ni);
            currentIdx = ni;
            updProg();
            scrollToWord(ni);
            if (currentIdx >= words.length - 1) {
                doneOverlay.classList.add('show');
                setStatus('🎉 完成！', 'highlight');
                setTimeout(function() { if (isRecording) stopMic(); }, 600);
            }
        }
    }

    // ===== 语音识别（次要功能） =====
    function initMic() {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setStatus('⚠️ 不支持语音', 'error'); return false; }
        recog = new SR();
        recog.lang = 'zh-CN'; recog.continuous = true; recog.interimResults = true; recog.maxAlternatives = 3;

        recog.onstart = function() {
            setStatus('🎤 聆听中...', 'highlight');
            btnMic.classList.add('active','listening'); isRecording = true;
            lastSpoken = '';
        };

        recog.onerror = function(e) {
            if (e.error === 'no-speech') setStatus('🔇 未听到声音', 'error');
            else if (e.error === 'aborted') { if (isRecording) setStatus('⏸', ''); }
            else { setStatus('❌ ' + e.error, 'error'); stopMic(); }
            if (isRecording && e.error !== 'aborted' && e.error !== 'not-allowed') {
                clearTimeout(recogTimer);
                recogTimer = setTimeout(function() { if (isRecording && recog) try { recog.start(); } catch(e) {} }, 300);
            }
        };

        recog.onend = function() {
            if (isRecording && inited && currentIdx < words.length - 1) {
                clearTimeout(recogTimer);
                recogTimer = setTimeout(function() { if (isRecording) try { recog.start(); } catch(e) { stopMic(); } }, 120);
            } else { stopMic(); }
        };

        recog.onresult = function(ev) {
            var finalT = '', interimT = '';
            for (var i = ev.resultIndex; i < ev.results.length; i++) {
                if (ev.results[i].isFinal) finalT += ev.results[i][0].transcript;
                else interimT += ev.results[i][0].transcript;
            }
            if (finalT) { var t = finalT.trim(); if (t && t !== lastSpoken) { lastSpoken = t; matchText(t); } }
            if (!finalT && interimT && interimT.trim().length >= 3) matchText(interimT.trim());
        };
        return true;
    }

    function startMic() {
        if (!inited || !words.length) { setStatus('📝 先导入稿件', 'error'); showTextModal(); return; }
        if (currentIdx >= words.length - 1) { resetAll(); }
        if (!recog && !initMic()) return;
        try { recog.start(); } catch(e) { initMic(); try { recog.start(); } catch(e2) { setStatus('❌ 启动失败', 'error'); } }
    }

    function stopMic() {
        isRecording = false; btnMic.classList.remove('active','listening');
        if (!doneOverlay.classList.contains('show')) setStatus('⏸', '');
        clearTimeout(recogTimer);
        if (recog) try { recog.abort(); } catch(e) {}
    }

    function toggleMic() {
        if (isRecording) stopMic(); else startMic();
    }

    // ===== 重置 =====
    function resetAll() {
        currentIdx = -1;
        for (var i = 0; i < elements.length; i++) elements[i].className = 'word';
        prog.style.width = '0%'; doneOverlay.classList.remove('show');
        wrapper.scrollTo({ top: 0, behavior: 'smooth' });
        setStatus('🔄 已重置', '');
        if (isScrolling) { stopScroll(); }
    }

    // ===== 文件 =====
    function importFile(f) {
        var r = new FileReader();
        r.onload = function(e) { loadText(e.target.result); setStatus('📂 ' + f.name, 'highlight'); };
        r.onerror = function() { setStatus('❌ 读取失败', 'error'); };
        r.readAsText(f, 'UTF-8');
    }

    // ===== 文字 =====
    function showTextModal() { textModal.classList.add('show'); textInput.value = ''; setTimeout(function(){ textInput.focus(); }, 300); }
    function hideTextModal() { textModal.classList.remove('show'); textInput.blur(); }
    function confirmText() {
        var t = textInput.value;
        if (!t.trim()) { setStatus('⚠️ 内容为空', 'error'); return; }
        loadText(t); hideTextModal(); setStatus('✏️ 已导入 (' + words.length + ' 词)', 'highlight');
    }

    // ===== 设置 =====
    function showSet() { settingsModal.classList.add('show'); }
    function hideSet() { settingsModal.classList.remove('show'); }

    fontSizeSlider.oninput = function() {
        var v = parseInt(this.value); fontSizeVal.textContent = v;
        root.style.setProperty('--tp-font-size', v + 'px');
        try { localStorage.setItem('tp_fs', v); } catch(e) {}
    };

    lineHeightSlider.oninput = function() {
        var v = parseFloat(this.value).toFixed(1); lineHeightVal.textContent = v;
        root.style.setProperty('--tp-line-height', v);
        try { localStorage.setItem('tp_lh', v); } catch(e) {}
    };

    letterSpaceSlider.oninput = function() {
        var v = parseFloat(this.value).toFixed(1); letterSpaceVal.textContent = v;
        tp.style.letterSpacing = v + 'px';
        try { localStorage.setItem('tp_ls', v); } catch(e) {}
    };

    colorGrid.onclick = function(e) {
        var d = e.target.closest('.color-dot'); if (!d) return;
        var c = d.dataset.c; if (!c) return;
        colorGrid.querySelectorAll('.color-dot').forEach(function(el) { el.classList.remove('active'); });
        d.classList.add('active');
        applyColor(c);
        try { localStorage.setItem('tp_c', c); } catch(e) {}
    };

    bgGrid.onclick = function(e) {
        var b = e.target.closest('.bg-box'); if (!b) return;
        var bg = b.dataset.bg; if (!bg) return;
        bgGrid.querySelectorAll('.bg-box').forEach(function(el) { el.classList.remove('active'); });
        b.classList.add('active');
        applyBg(bg);
        if (currentColor !== 'default') applyColor(currentColor);
        // Update status bar text color for light theme
        try { localStorage.setItem('tp_bg', bg); } catch(e) {}
    };

    // ===== 加载设置 =====
    function loadSet() {
        try {
            var fs = localStorage.getItem('tp_fs');
            if (fs) { var v = parseInt(fs); fontSizeSlider.value = v; fontSizeVal.textContent = v; root.style.setProperty('--tp-font-size', v+'px'); }
            var lh = localStorage.getItem('tp_lh');
            if (lh) { var v = parseFloat(lh).toFixed(1); lineHeightSlider.value = v; lineHeightVal.textContent = v; root.style.setProperty('--tp-line-height', v); }
            var ls = localStorage.getItem('tp_ls');
            if (ls) { var v = parseFloat(ls).toFixed(1); letterSpaceSlider.value = v; letterSpaceVal.textContent = v; tp.style.letterSpacing = v+'px'; }
            var bg = localStorage.getItem('tp_bg');
            if (bg) { applyBg(bg); bgGrid.querySelectorAll('.bg-box').forEach(function(el) { el.classList.toggle('active', el.dataset.bg === bg); }); }
            var c = localStorage.getItem('tp_c');
            if (c) { applyColor(c); colorGrid.querySelectorAll('.color-dot').forEach(function(el) { el.classList.toggle('active', el.dataset.c === c); }); }
        } catch(e) {}
    }

    // ===== 事件 =====
    btnScroll.onclick = toggleScroll;
    scrollSpeed.oninput = function() {
        var v = parseInt(this.value); scrollSpeedVal.textContent = v;
        if (isScrolling) { stopScroll(); startScroll(); }
    };
    btnMic.onclick = toggleMic;
    btnImport.onclick = function() { fileInput.click(); };
    fileInput.onchange = function() { if (this.files.length) { importFile(this.files[0]); } this.value = ''; };
    btnPaste.onclick = showTextModal;
    modalCancel.onclick = hideTextModal;
    modalConfirm.onclick = confirmText;
    textModal.onclick = function(e) { if (e.target === this) hideTextModal(); };
    btnReset.onclick = resetAll;
    btnSettings.onclick = showSet;
    settingsDone.onclick = hideSet;
    settingsModal.onclick = function(e) { if (e.target === this) hideSet(); };
    fabTop.onclick = goTop;
    tp.onscroll = updFab;
    textInput.onkeydown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); confirmText(); } };

    // 点击单词跳转
    tp.onclick = function(e) {
        var t = e.target.closest('.word'); if (!t) return;
        var idx = parseInt(t.dataset.index);
        if (isNaN(idx) || idx < 0 || idx >= elements.length) return;
        if (isRecording) stopMic();
        for (var i = 0; i < elements.length; i++) elements[i].className = 'word';
        if (idx === 0) {
            currentIdx = -1; updProg(); wrapper.scrollTo({top:0,behavior:'smooth'});
            setStatus('🔄 回到开头', '');
        } else {
            for (var i = 0; i <= idx; i++) elements[i].classList.add('spoken');
            elements[idx].classList.remove('spoken'); elements[idx].classList.add('active','current');
            currentIdx = idx; updProg(); scrollToWord(idx);
            setStatus('👆 ' + (idx+1) + '/' + words.length, '');
        }
        doneOverlay.classList.remove('show');
    };

    // iOS 回弹
    document.addEventListener('touchmove', function(e) {
        if (!e.target.closest('#tp-content') && !e.target.closest('.modal')) e.preventDefault();
    }, { passive: false });

    // ===== 初始化 =====
    loadSet();
    showEmpty();
    setStatus('💡 准备就绪', '');

    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        if (location.hostname === '' || location.hostname === 'file://') {
            setStatus('⚠️ 部署到 HTTPS 使用语音', 'error');
        }
    }

    console.log('🎤 AI提词器 v3.0 — 自动下滑为主·语音为辅');
})();
</script>
